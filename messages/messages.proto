// This file defines the data contracts (messages) for your Axiom package.
// Every node's --input and --output refers to a message defined here.
//
// Run `axiom create message <Name>` to scaffold a new message below.
// Run `axiom generate` to compile these definitions into language bindings in gen/.
//
// DOCUMENTATION
//   Comments written directly above a message or field declaration are extracted
//   automatically at publish time and shown in the Axiom registry as documentation.
//   Write your descriptions there — no separate doc files needed.
//
//   Leading comment  (no blank line before the declaration) → registry description ✓
//   Detached comment (blank line before the declaration)    → ignored by registry  ✗
//
// This file is yours to edit. Axiom only appends new message blocks — it never
// overwrites or removes content you have written.

syntax = "proto3";

package christiangeorgelucas.sbom_tools;

// A raw SBOM document supplied by the caller — the input to every parsing node.
// The document is always caller-supplied text; nodes never fetch, generate, or
// cache one. `format_hint` lets a caller skip auto-detection when it already
// knows the format; leave it empty to auto-detect.
message SbomDocument {
  // Raw SBOM document text — CycloneDX JSON, SPDX JSON, or SPDX tag-value.
  string text = 1;
  // Optional: "cyclonedx-json" | "spdx-json" | "spdx-tag-value". Empty auto-detects.
  string format_hint = 2;
}

// One normalized component/package, regardless of source format.
message Component {
  // The document-local reference (CycloneDX bom-ref, or SPDX SPDXID).
  string ref = 1;
  string name = 2;
  string version = 3;
  // CycloneDX component type (library, application, framework, ...). Empty for SPDX.
  string type = 4;
  // Package URL (pkg:type/namespace/name@version), when declared.
  string purl = 5;
  string supplier = 6;
  // Every distinct license identifier/expression declared for this component.
  repeated string licenses = 7;
  // False when no usable license information was found (NOASSERTION/NONE/absent) — the compliance-gap signal.
  bool license_declared = 8;
  string copyright = 9;
  string description = 10;
}

// One dependency-graph edge: `ref` depends on every ref in `depends_on`.
message DependencyEdge {
  string ref = 1;
  repeated string depends_on = 2;
}

// One CVSS-style rating on a declared vulnerability.
message VulnerabilityRating {
  string source = 1;
  string severity = 2;
  double score = 3;
  string method = 4;
  string vector = 5;
}

// A declared vulnerability (CycloneDX VEX). SPDX 2.x carries no vulnerability data,
// so this is always empty when the source document is SPDX.
message Vulnerability {
  string id = 1;
  string source = 2;
  repeated VulnerabilityRating ratings = 3;
  // Component refs this vulnerability affects.
  repeated string affects = 4;
  string description = 5;
}

// Document-level metadata, taken verbatim from the document — never generated.
message SbomMetadata {
  string tool_name = 1;
  string tool_version = 2;
  // The document's own declared creation timestamp, verbatim (never generated by this package).
  string timestamp = 3;
  string primary_component_ref = 4;
  string primary_component_name = 5;
  // CycloneDX serialNumber, or SPDX document name.
  string document_name = 6;
  // SPDX documentNamespace. Empty for CycloneDX.
  string namespace = 7;
}

// Format/spec-version detection result.
message DetectFormatResult {
  bool ok = 1;
  string error = 2;
  // "cyclonedx" | "spdx" | "unknown"
  string format = 3;
  // "json" | "tag-value" | "unknown"
  string encoding = 4;
  string spec_version = 5;
  bool detected = 6;
}

// A full normalized parse of an SBOM document.
message NormalizedSbom {
  bool ok = 1;
  string error = 2;
  DetectFormatResult format = 3;
  SbomMetadata metadata = 4;
  repeated Component components = 5;
  repeated DependencyEdge dependencies = 6;
  repeated Vulnerability vulnerabilities = 7;
  // Always false; reserved for output-schema stability (response size is
  // bounded by the platform, not this node).
  bool truncated = 8;
}

message ListComponentsResult {
  bool ok = 1;
  string error = 2;
  repeated Component components = 3;
  int32 count = 4;
  // Always false; reserved for output-schema stability.
  bool truncated = 5;
}

// One component's PURL, or its absence.
message ComponentPurl {
  string ref = 1;
  string name = 2;
  string purl = 3;
  bool has_purl = 4;
}

message ExtractPurlsResult {
  bool ok = 1;
  string error = 2;
  repeated ComponentPurl purls = 3;
  int32 count = 4;
}

// One component's resolved license set.
message ComponentLicenses {
  string ref = 1;
  string name = 2;
  repeated string licenses = 3;
  bool declared = 4;
}

message ExtractLicensesResult {
  bool ok = 1;
  string error = 2;
  repeated ComponentLicenses entries = 3;
}

// The license-audit node: every distinct license identifier/expression used anywhere in the SBOM.
message ListDistinctLicensesResult {
  bool ok = 1;
  string error = 2;
  repeated string licenses = 3;
  int32 count = 4;
}

message LicenseExpressionRequest {
  // An SPDX license expression, e.g. "(MIT OR Apache-2.0) AND BSD-3-Clause".
  string expression = 1;
}

// A parsed SPDX license expression.
message ParseLicenseExpressionResult {
  bool ok = 1;
  string error = 2;
  // Every distinct SPDX license ID referenced in the expression.
  repeated string license_ids = 3;
  // Every distinct SPDX exception ID referenced (the "WITH <exception>" clause), if any.
  repeated string exception_ids = 4;
  // The full parsed AST, JSON-serialized (conjunction/disjunction/license/exception nodes), for full fidelity.
  string ast_json = 5;
}

// Components with no usable license declared — a compliance gap.
message FindMissingLicensesResult {
  bool ok = 1;
  string error = 2;
  repeated Component components = 3;
  int32 count = 4;
  int32 total_components = 5;
}

message ExtractDependencyGraphResult {
  bool ok = 1;
  string error = 2;
  repeated DependencyEdge edges = 3;
}

message ExtractVulnerabilitiesResult {
  bool ok = 1;
  string error = 2;
  repeated Vulnerability vulnerabilities = 3;
  int32 count = 4;
}

message ExtractMetadataResult {
  bool ok = 1;
  string error = 2;
  SbomMetadata metadata = 3;
}

// One tally entry for a summary breakdown (e.g. type -> count).
message CountEntry {
  string key = 1;
  int32 count = 2;
}

message SummarizeResult {
  bool ok = 1;
  string error = 2;
  int32 component_count = 3;
  repeated CountEntry by_type = 4;
  repeated CountEntry by_license = 5;
  repeated CountEntry by_ecosystem = 6;
  int32 vulnerability_count = 7;
  int32 dependency_edge_count = 8;
}

message FilterByEcosystemRequest {
  string text = 1;
  string format_hint = 2;
  // Package URL type segment to filter on, e.g. "npm", "maven", "golang", "pypi", "cargo". Case-insensitive.
  string ecosystem = 3;
}

// Basic structural-correctness check for the detected format.
message ValidateStructureResult {
  bool ok = 1;
  string error = 2;
  bool valid = 3;
  string format = 4;
  repeated string issues = 5;
}
